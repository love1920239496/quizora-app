name: quizora_cbse_smart
description: "Quizora - CBSE Smart Study Companion. A gamified Board exam revision app with dynamic quizzes and textbook summaries."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  shared_preferences: ^2.2.2
  sqflite: ^2.3.0
  path: ^1.8.3
  google_fonts: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/data/
    - assets/data/class_10/
    - assets/data/class_12/
